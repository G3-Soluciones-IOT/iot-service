spring.application.name=iot-service
server.port=${SERVER_PORT:8091}
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://config-service:8888}
spring.cloud.config.retry.max-attempts=20
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-interval=3000
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
spring.cloud.config.enabled=false
eureka.client.enabled=false
springdoc.swagger-ui.enabled=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:iot_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:password}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=pe.edu.upc.iot_service.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy
springdoc.packagesToScan=pe.edu.upc.iot_service
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-service:8761/eureka/}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:iot-service}
eureka.instance.instance-id=${spring.application.name}:${server.port}

auth0.issuer-uri=${AUTH0_ISSUER_URI:https://auth0.local/}
auth0.audience=${AUTH0_AUDIENCE:jameofit-api}
legacy.jwt.enabled=${LEGACY_JWT_ENABLED:true}
legacy.jwt.issuer=${LEGACY_JWT_ISSUER:${JWT_ISSUER:iam-service}}
legacy.jwt.jwk-set-uri=${LEGACY_JWT_JWK_SET_URI:${JWT_JWK_SET_URI:http://iam-service:8081/api/v1/jwks/.well-known/jwks.json}}

spring.security.oauth2.resource-server.jwt.issuer-uri=${auth0.issuer-uri}
spring.security.oauth2.resource-server.jwt.jwk-set-uri=${legacy.jwt.jwk-set-uri}

iot.api-key.salt=${IOT_API_KEY_SALT:12}
iot.device.max-per-user=${IOT_DEVICE_MAX_PER_USER:5}
